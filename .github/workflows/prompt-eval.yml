name: Prompt Evaluation

on:
  pull_request:
    paths:
      - 'tests/prompts/**'
      - '.github/workflows/prompt-eval.yml'
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  evaluate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Promptfoo
        run: npm install -g promptfoo

      - name: Run Prompt Evaluation
        run: |
          cd tests/prompts
          promptfoo eval \
            --max-concurrency 3 \
            --output results/evaluation.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prompt-evaluation-results
          path: tests/prompts/results/
          retention-days: 30

      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('tests/prompts/results/evaluation.json', 'utf8'));
            
            const body = `## 📊 Prompt Evaluation Results
            
            | Prompt | Provider | Pass Rate | Avg Score |
            |--------|----------|-----------|-----------|
            ${results.results.map(r => 
              `| ${r.promptId} | ${r.provider} | ${r.passRate}% | ${r.avgScore} |`
            ).join('\n')}
            
            [View full results](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            `;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
